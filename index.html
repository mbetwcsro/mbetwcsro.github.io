<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Travel Witch Cookie s.r.o.</title>

<style>
:root {
  --bg: #f7f7f7;
  --card: #ffffff;
  --text: #111;
  --muted: #666;
  --accent: #000;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

/* HEADER */
h1 {
  font-size: 40px;
  font-weight: 700;
  margin-bottom: 30px;
}

/* HERO */
.hero {
  background: var(--card);
  border-radius: 16px;
  height: 260px;
  margin-bottom: 30px;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 30px;
}

.card {
  background: var(--card);
  border-radius: 16px;
  padding: 30px 20px;
  text-align: center;
}

.card h3 {
  font-size: 16px;
  margin-top: 10px;
}

/* SECOND BLOCK */
.block {
  background: var(--card);
  border-radius: 16px;
  height: 220px;
  margin-bottom: 20px;
}

.text {
  color: var(--muted);
  font-size: 14px;
  max-width: 500px;
  margin-bottom: 50px;
}

/* CONTACT */
.contact {
  text-align: center;
  padding: 40px 20px;
}

.contact h2 {
  font-size: 22px;
}

.contact p {
  color: var(--muted);
  margin-bottom: 15px;
}

.email {
  display: inline-block;
  background: black;
  color: white;
  padding: 12px 20px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 14px;
}

/* RESPONSIVE */

@media (max-width: 900px) {
  .cards {
    grid-template-columns: 1fr 1fr;
  }
}

@media (max-width: 600px) {
  h1 {
    font-size: 28px;
  }

  .cards {
    grid-template-columns: 1fr;
  }

  .hero {
    height: 180px;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <h1>Payments.</h1>

  <!-- HERO -->
  <div class="hero"></div>

  <!-- CARDS -->
  <div class="cards">
    <div class="card">
      <h3>Modern payment cards<br><span style="color:var(--muted)">Moderní platební karty</span></h3>
    </div>
    <div class="card">
      <h3>Secure processing<br><span style="color:var(--muted)">Bezpečné zpracování</span></h3>
    </div>
    <div class="card">
      <h3>Consulting excellence<br><span style="color:var(--muted)">Konzultační expertíza</span></h3>
    </div>
  </div>

  <!-- SECOND BLOCK -->
  <div class="block"></div>

  <p class="text">
    Konzultace v oblasti karet a plateb.<br>
    Payment cards & payments consulting.<br><br>
    Minimal. Direct. Effective.
  </p>

  <!-- CONTACT -->
  <div class="contact">
    <h2>Get in touch.</h2>
    <p>Minimal. Direct.</p>
    <a class="email" href="mailto:consulting@twcsro.cz">
      consulting@twcsro.cz
    </a>
  </div>

</div>

</body>
</html>
